apiVersion: v1
kind: Service
metadata:
  name: stellarflow-backend-service
  labels:
    app: stellarflow-backend
spec:
  type: LoadBalancer # Use LoadBalancer for external access, or ClusterIP with Ingress
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: stellarflow-backend
